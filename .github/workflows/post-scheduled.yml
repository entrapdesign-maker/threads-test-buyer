name: Post Scheduled

on:
  schedule:
    # JST 毎時0分にチェック (= UTC 毎時0分)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_date:
        description: "強制的に投稿する日付 (YYYY-MM-DD, 任意)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post to Threads
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          FORCE_DATE: ${{ github.event.inputs.force_date || '' }}
          TZ: "Asia/Tokyo"
        run: python scripts/post_threads.py

      - name: Commit posted log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drafts/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore(drafts): mark posted [skip ci]"
            git push
          fi
